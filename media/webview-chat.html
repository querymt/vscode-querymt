<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
  />
  <title>QueryMT Chat</title>
  <style>
    :root {
      --bg: var(--vscode-editor-background);
      --fg: var(--vscode-editor-foreground);
      --input-bg: var(--vscode-input-background);
      --input-fg: var(--vscode-input-foreground);
      --input-border: var(--vscode-input-border, transparent);
      --btn-bg: var(--vscode-button-background);
      --btn-fg: var(--vscode-button-foreground);
      --btn-hover: var(--vscode-button-hoverBackground);
      --btn-secondary-bg: var(--vscode-button-secondaryBackground);
      --btn-secondary-fg: var(--vscode-button-secondaryForeground);
      --btn-secondary-hover: var(--vscode-button-secondaryHoverBackground);
      --border: var(--vscode-panel-border, var(--vscode-widget-border, #444));
      --bubble-user: var(--vscode-textBlockQuote-background, rgba(255,255,255,0.05));
      --bubble-assistant: transparent;
      --toolbar-bg: var(--vscode-sideBar-background, var(--bg));
      --scrollbar: var(--vscode-scrollbarSlider-background);
      --code-bg: var(--vscode-textCodeBlock-background, rgba(0,0,0,0.2));
      --link: var(--vscode-textLink-foreground);
      --error: var(--vscode-errorForeground, #f44);
      --muted: var(--vscode-descriptionForeground, #999);
      --tool-bg: var(--vscode-textBlockQuote-background, rgba(255,255,255,0.03));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--toolbar-bg);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar select {
      background: var(--input-bg);
      color: var(--input-fg);
      border: 1px solid var(--input-border);
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 12px;
      font-family: inherit;
      max-width: 220px;
      cursor: pointer;
    }

    .toolbar select:focus {
      outline: 1px solid var(--vscode-focusBorder, #007acc);
    }

    .toolbar label {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar-spacer { flex: 1; }

    .btn-icon {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-fg);
      border: none;
      border-radius: 3px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-icon:hover { background: var(--btn-secondary-hover); }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 4px;
    }

    .msg {
      margin-bottom: 16px;
      max-width: 100%;
    }

    .msg-role {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .msg-body {
      padding: 8px 12px;
      border-radius: 6px;
      line-height: 1.5;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .msg-user .msg-body {
      background: var(--bubble-user);
      border: 1px solid var(--border);
    }

    .msg-assistant .msg-body {
      background: var(--bubble-assistant);
    }

    .msg-error .msg-body {
      color: var(--error);
      border: 1px solid var(--error);
      border-radius: 6px;
    }

    /* Markdown-ish rendering */
    .msg-body p { margin: 0 0 8px 0; }
    .msg-body p:last-child { margin-bottom: 0; }

    .msg-body pre {
      background: var(--code-bg);
      border-radius: 4px;
      padding: 8px 10px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
      white-space: pre-wrap;
    }

    .msg-body code {
      background: var(--code-bg);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 0.92em;
    }

    .msg-body pre code {
      background: none;
      padding: 0;
    }

    .msg-body ul, .msg-body ol {
      padding-left: 20px;
      margin: 4px 0;
    }

    .msg-body a {
      color: var(--link);
      text-decoration: none;
    }

    .msg-body strong { font-weight: 600; }
    .msg-body em { font-style: italic; }

    .msg-body blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--muted);
    }

    .msg-body h1, .msg-body h2, .msg-body h3,
    .msg-body h4, .msg-body h5, .msg-body h6 {
      margin: 12px 0 6px 0;
      font-weight: 600;
    }
    .msg-body h1 { font-size: 1.4em; }
    .msg-body h2 { font-size: 1.2em; }
    .msg-body h3 { font-size: 1.1em; }

    /* Tool call — collapsible <details> */
    .tool-call {
      margin: 6px 0;
      border-radius: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .tool-call summary {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--tool-bg);
      border-radius: 4px;
      list-style: none;
      user-select: none;
    }
    .tool-call summary::-webkit-details-marker { display: none; }
    .tool-call summary::marker { display: none; content: ""; }

    .tool-call summary .tool-arrow {
      font-size: 10px;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .tool-call[open] summary .tool-arrow {
      transform: rotate(90deg);
    }

    .tool-call summary .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--muted);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .tool-call.done summary .spinner { display: none; }
    .tool-call.failed summary .spinner { display: none; }

    .tool-call .tool-status-icon {
      display: none;
      flex-shrink: 0;
    }
    .tool-call.done .tool-status-icon {
      display: inline;
    }
    .tool-call.done .tool-status-icon::after { content: "\2713"; }
    .tool-call.failed .tool-status-icon {
      display: inline;
      color: var(--error);
    }
    .tool-call.failed .tool-status-icon::after { content: "\2717"; }

    .tool-call .tool-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-call .tool-details {
      padding: 6px 10px 8px 28px;
      max-height: 300px;
      overflow: auto;
    }
    .tool-call .tool-details pre {
      background: var(--code-bg);
      border-radius: 4px;
      padding: 6px 8px;
      margin: 4px 0;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: var(--vscode-editor-font-size, 12px);
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .tool-call .tool-details .tool-path {
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--fg);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Thinking / thought */
    .thought {
      font-style: italic;
      color: var(--muted);
      font-size: 0.92em;
    }

    /* Loading indicator */
    .loading {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .loading.visible { display: flex; }
    .loading .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--muted);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .welcome h2 {
      margin-bottom: 8px;
      color: var(--fg);
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--toolbar-bg);
      flex-shrink: 0;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      resize: none;
      background: var(--input-bg);
      color: var(--input-fg);
      border: 1px solid var(--input-border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: inherit;
      line-height: 1.4;
      min-height: 38px;
      max-height: 200px;
      overflow-y: auto;
    }

    .input-area textarea:focus {
      outline: 1px solid var(--vscode-focusBorder, #007acc);
    }

    .input-area textarea::placeholder {
      color: var(--muted);
    }

    .input-area button {
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      min-height: 38px;
    }
    .input-area button:hover { background: var(--btn-hover); }
    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-area .btn-cancel {
      background: var(--btn-secondary-bg);
      color: var(--btn-secondary-fg);
    }
    .input-area .btn-cancel:hover { background: var(--btn-secondary-hover); }

    /* ── @file autocomplete popup ── */
    .input-area { position: relative; }

    #file-popup {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      background: var(--vscode-editorSuggestWidget-background, var(--input-bg));
      border: 1px solid var(--vscode-editorSuggestWidget-border, var(--border));
      border-radius: 4px;
      display: none;
      z-index: 100;
      margin-bottom: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #file-popup.visible { display: block; }

    #file-popup::-webkit-scrollbar { width: 6px; }
    #file-popup::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 3px;
    }

    .file-item {
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .file-item:hover {
      background: var(--vscode-list-hoverBackground, rgba(255,255,255,0.05));
    }
    .file-item.active {
      background: var(--vscode-list-activeSelectionBackground, #094771);
      color: var(--vscode-list-activeSelectionForeground, #fff);
    }
    .file-item .file-icon {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 11px;
    }
    .file-item .file-name {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-item .file-path {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-left: auto;
      flex-shrink: 0;
      max-width: 50%;
    }
    .file-item.active .file-path {
      color: var(--vscode-list-activeSelectionForeground, #fff);
      opacity: 0.7;
    }

    #file-popup .popup-header {
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <label for="sel-session">Session</label>
      <select id="sel-session" title="Switch session">
        <option value="">No sessions</option>
      </select>
    </div>

    <div class="toolbar-group">
      <label for="sel-model">Model</label>
      <select id="sel-model" title="Select model">
        <option value="">Default</option>
      </select>
    </div>

    <div class="toolbar-group">
      <label for="sel-mode">Mode</label>
      <select id="sel-mode" title="Agent mode">
        <option value="">--</option>
      </select>
    </div>

    <div class="toolbar-group">
      <label for="sel-effort">Effort</label>
      <select id="sel-effort" title="Reasoning effort">
        <option value="">--</option>
      </select>
    </div>

    <div class="toolbar-spacer"></div>
    <button class="btn-icon" id="btn-new" title="New session">+ New</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>QueryMT</h2>
      <p>Start a conversation or select a session above.</p>
    </div>
  </div>

  <!-- Loading indicator -->
  <div class="loading" id="loading">
    <span class="spinner"></span>
    <span>Thinking...</span>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div id="file-popup"></div>
    <textarea
      id="input"
      rows="1"
      placeholder="Ask QueryMT... (use @ to reference files)"
      autofocus
    ></textarea>
    <button id="btn-send">Send</button>
    <button id="btn-cancel" class="btn-cancel" style="display:none">Cancel</button>
  </div>

  <script>
    // Acquire the VS Code API handle
    const vscode = acquireVsCodeApi();

    // ── DOM refs ──
    const selSession = document.getElementById("sel-session");
    const selModel = document.getElementById("sel-model");
    const selMode = document.getElementById("sel-mode");
    const selEffort = document.getElementById("sel-effort");
    const btnNew = document.getElementById("btn-new");
    const messagesEl = document.getElementById("messages");
    const welcomeEl = document.getElementById("welcome");
    const loadingEl = document.getElementById("loading");
    const inputEl = document.getElementById("input");
    const btnSend = document.getElementById("btn-send");
    const btnCancel = document.getElementById("btn-cancel");
    const filePopup = document.getElementById("file-popup");

    let isStreaming = false;

    // @file autocomplete state
    let popupVisible = false;
    let popupItems = [];    // [{name, path}, ...]
    let popupActiveIdx = 0; // highlighted index
    let atMentionStart = -1; // cursor position of the '@'
    let currentAssistantBody = null; // the .msg-body element being streamed into
    let currentMarkdownDiv = null;   // the current .msg-markdown div receiving chunks
    let markdownBuffer = ""; // accumulates raw markdown for the current segment

    // ── Outgoing messages ──

    function send(type, payload) {
      vscode.postMessage({ type, ...payload });
    }

    btnNew.addEventListener("click", () => send("newSession", {}));

    selSession.addEventListener("change", () => {
      const id = selSession.value;
      if (id) send("switchSession", { sessionId: id });
    });

    selModel.addEventListener("change", () => {
      const id = selModel.value;
      if (id) send("setModel", { modelId: id });
    });

    selMode.addEventListener("change", () => {
      const val = selMode.value;
      if (val) send("setConfigOption", { configId: "mode", value: val });
    });

    selEffort.addEventListener("change", () => {
      const val = selEffort.value;
      if (val) send("setConfigOption", { configId: "reasoning_effort", value: val });
    });

    btnSend.addEventListener("click", submitPrompt);
    btnCancel.addEventListener("click", () => send("cancel", {}));

    inputEl.addEventListener("keydown", (e) => {
      // When popup is visible, intercept navigation keys
      if (popupVisible) {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          popupActiveIdx = Math.min(popupActiveIdx + 1, popupItems.length - 1);
          renderPopupHighlight();
          return;
        }
        if (e.key === "ArrowUp") {
          e.preventDefault();
          popupActiveIdx = Math.max(popupActiveIdx - 1, 0);
          renderPopupHighlight();
          return;
        }
        if (e.key === "Tab" || (e.key === "Enter" && popupItems.length > 0)) {
          e.preventDefault();
          insertFileReference(popupItems[popupActiveIdx]);
          return;
        }
        if (e.key === "Escape") {
          e.preventDefault();
          hideFilePopup();
          return;
        }
      }

      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submitPrompt();
      }
    });

    // Auto-grow textarea + trigger @file autocomplete
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
      checkAtMention();
    });

    function submitPrompt() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;
      send("prompt", { text });
      appendMessage("user", text);
      inputEl.value = "";
      inputEl.style.height = "auto";
    }

    // ── Incoming messages ──

    window.addEventListener("message", (event) => {
      const msg = event.data;
      switch (msg.type) {
        case "sessions":
          populateSelect(selSession, msg.sessions.map((s) => ({
            value: s.id,
            label: s.title || s.id.slice(0, 12),
          })), msg.activeId);
          break;

        case "models":
          populateSelect(selModel, [
            { value: "", label: "Default" },
            ...msg.models.map((m) => ({
              value: m.id,
              label: m.provider ? `${m.label} (${m.provider})` : m.label,
            })),
          ], msg.activeId || "");
          break;

        case "configOptions":
          for (const opt of msg.options) {
            let sel = null;
            if (opt.configId === "mode") sel = selMode;
            else if (opt.configId === "reasoning_effort") sel = selEffort;
            if (!sel) continue;
            populateSelect(sel, [
              { value: "", label: "--" },
              ...opt.items.map((i) => ({ value: i.value, label: i.label })),
            ], opt.currentValue || "");
          }
          break;

        case "status":
          setStreamingState(msg.state === "streaming" || msg.state === "loading");
          break;

        case "chunk":
          ensureAssistantBubble();
          markdownBuffer += msg.text;
          currentMarkdownDiv.innerHTML = renderMarkdown(markdownBuffer);
          scrollToBottom();
          break;

        case "thought": {
          ensureAssistantBubble();
          // Flush current markdown segment
          if (markdownBuffer) {
            currentMarkdownDiv.innerHTML = renderMarkdown(markdownBuffer);
            markdownBuffer = "";
          }
          const thoughtSpan = document.createElement("span");
          thoughtSpan.className = "thought";
          thoughtSpan.textContent = msg.text;
          currentAssistantBody.appendChild(thoughtSpan);
          // Start a new markdown segment after the thought
          const mdAfterThought = document.createElement("div");
          mdAfterThought.className = "msg-markdown";
          currentAssistantBody.appendChild(mdAfterThought);
          currentMarkdownDiv = mdAfterThought;
          scrollToBottom();
          break;
        }

        case "toolProgress": {
          ensureAssistantBubble();
          const toolId = msg.toolCallId || msg.title;
          let el = currentAssistantBody.querySelector(`details[data-tool-id="${CSS.escape(toolId)}"]`);
          if (!el) {
            // Flush current markdown segment before inserting tool call
            if (markdownBuffer) {
              currentMarkdownDiv.innerHTML = renderMarkdown(markdownBuffer);
              markdownBuffer = "";
            }
            el = document.createElement("details");
            el.className = "tool-call";
            el.setAttribute("data-tool-id", toolId);
            el.innerHTML =
              `<summary>` +
                `<span class="tool-arrow">\u25B6</span>` +
                `<span class="spinner"></span>` +
                `<span class="tool-status-icon"></span>` +
                `<span class="tool-label"></span>` +
              `</summary>` +
              `<div class="tool-details"></div>`;
            currentAssistantBody.appendChild(el);
            // Start a new markdown segment after the tool call
            const mdAfterTool = document.createElement("div");
            mdAfterTool.className = "msg-markdown";
            currentAssistantBody.appendChild(mdAfterTool);
            currentMarkdownDiv = mdAfterTool;
          }
          el.querySelector(".tool-label").textContent = msg.title;
          if (msg.status === "completed") {
            el.classList.add("done");
          } else if (msg.status === "failed") {
            el.classList.add("failed");
          }
          scrollToBottom();
          break;
        }

        case "toolContent": {
          ensureAssistantBubble();
          const tcId = msg.toolCallId || "";
          const detailsEl = currentAssistantBody.querySelector(`details[data-tool-id="${CSS.escape(tcId)}"]`);
          if (detailsEl) {
            const container = detailsEl.querySelector(".tool-details");
            if (msg.contentType === "diff") {
              const lines = (msg.content || "").split("\n");
              const pathLine = lines[0] || "";
              const diffBody = lines.slice(1).join("\n");
              const pathEl = document.createElement("div");
              pathEl.className = "tool-path";
              pathEl.textContent = pathLine;
              container.appendChild(pathEl);
              const pre = document.createElement("pre");
              pre.textContent = diffBody;
              container.appendChild(pre);
            } else {
              const pre = document.createElement("pre");
              pre.textContent = msg.content || "";
              container.appendChild(pre);
            }
          }
          scrollToBottom();
          break;
        }

        case "fileSuggestions":
          showFilePopup(msg.files || []);
          break;

        case "error":
          finishAssistantBubble();
          appendMessage("error", msg.message);
          break;

        case "clear":
          clearMessages();
          break;

        case "done":
          finishAssistantBubble();
          break;
      }
    });

    // ── Helpers ──

    function populateSelect(sel, items, activeValue) {
      sel.innerHTML = "";
      for (const item of items) {
        const opt = document.createElement("option");
        opt.value = item.value;
        opt.textContent = item.label;
        if (item.value === activeValue) opt.selected = true;
        sel.appendChild(opt);
      }
    }

    function setStreamingState(streaming) {
      isStreaming = streaming;
      inputEl.disabled = streaming;
      btnSend.disabled = streaming;
      btnSend.style.display = streaming ? "none" : "";
      btnCancel.style.display = streaming ? "" : "none";
      loadingEl.classList.toggle("visible", streaming);
    }

    function appendMessage(role, text) {
      welcomeEl.style.display = "none";
      const wrapper = document.createElement("div");
      wrapper.className = `msg msg-${role}`;

      const roleEl = document.createElement("div");
      roleEl.className = "msg-role";
      roleEl.textContent = role === "error" ? "Error" : role;
      wrapper.appendChild(roleEl);

      const body = document.createElement("div");
      body.className = "msg-body";
      if (role === "user") {
        body.textContent = text;
      } else {
        body.innerHTML = renderMarkdown(text);
      }
      wrapper.appendChild(body);

      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function ensureAssistantBubble() {
      if (currentAssistantBody) return;
      welcomeEl.style.display = "none";
      const wrapper = document.createElement("div");
      wrapper.className = "msg msg-assistant";

      const roleEl = document.createElement("div");
      roleEl.className = "msg-role";
      roleEl.textContent = "assistant";
      wrapper.appendChild(roleEl);

      const body = document.createElement("div");
      body.className = "msg-body";
      wrapper.appendChild(body);

      // Create the first markdown segment
      const mdDiv = document.createElement("div");
      mdDiv.className = "msg-markdown";
      body.appendChild(mdDiv);

      messagesEl.appendChild(wrapper);
      currentAssistantBody = body;
      currentMarkdownDiv = mdDiv;
      markdownBuffer = "";
    }

    function finishAssistantBubble() {
      if (currentMarkdownDiv && markdownBuffer) {
        currentMarkdownDiv.innerHTML = renderMarkdown(markdownBuffer);
      }
      currentAssistantBody = null;
      currentMarkdownDiv = null;
      markdownBuffer = "";
      setStreamingState(false);
    }

    function clearMessages() {
      messagesEl.innerHTML = "";
      messagesEl.appendChild(welcomeEl);
      welcomeEl.style.display = "";
      currentAssistantBody = null;
      currentMarkdownDiv = null;
      markdownBuffer = "";
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Lightweight Markdown renderer ──
    // Handles: headings, bold, italic, inline code, code blocks,
    // links, blockquotes, unordered/ordered lists, paragraphs, horizontal rules.

    function renderMarkdown(md) {
      // Normalize line endings
      let text = md.replace(/\r\n/g, "\n");

      // Fenced code blocks
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${escapeHtml(code.replace(/\n$/, ""))}</code></pre>`;
      });

      // Split into lines for block-level processing
      const lines = text.split("\n");
      let html = "";
      let inList = false;
      let listTag = "";
      let inBlockquote = false;
      let i = 0;

      while (i < lines.length) {
        let line = lines[i];

        // Skip if inside a <pre> block (already handled)
        if (line.includes("<pre>")) {
          let preBlock = line;
          while (!line.includes("</pre>") && i + 1 < lines.length) {
            i++;
            line = lines[i];
            preBlock += "\n" + line;
          }
          html += preBlock;
          i++;
          continue;
        }

        // Close list if needed
        if (inList && !/^(\s*[-*]\s|^\s*\d+\.\s)/.test(line) && line.trim() !== "") {
          html += `</${listTag}>`;
          inList = false;
        }

        // Close blockquote
        if (inBlockquote && !line.startsWith(">")) {
          html += "</blockquote>";
          inBlockquote = false;
        }

        // Horizontal rule
        if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line.trim())) {
          html += "<hr>";
          i++;
          continue;
        }

        // Headings
        const headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
        if (headingMatch) {
          const level = headingMatch[1].length;
          html += `<h${level}>${inlineMarkdown(headingMatch[2])}</h${level}>`;
          i++;
          continue;
        }

        // Blockquote
        if (line.startsWith("> ") || line === ">") {
          if (!inBlockquote) {
            html += "<blockquote>";
            inBlockquote = true;
          }
          html += `<p>${inlineMarkdown(line.replace(/^>\s?/, ""))}</p>`;
          i++;
          continue;
        }

        // Unordered list
        const ulMatch = line.match(/^\s*[-*]\s+(.*)$/);
        if (ulMatch) {
          if (!inList || listTag !== "ul") {
            if (inList) html += `</${listTag}>`;
            html += "<ul>";
            inList = true;
            listTag = "ul";
          }
          html += `<li>${inlineMarkdown(ulMatch[1])}</li>`;
          i++;
          continue;
        }

        // Ordered list
        const olMatch = line.match(/^\s*\d+\.\s+(.*)$/);
        if (olMatch) {
          if (!inList || listTag !== "ol") {
            if (inList) html += `</${listTag}>`;
            html += "<ol>";
            inList = true;
            listTag = "ol";
          }
          html += `<li>${inlineMarkdown(olMatch[1])}</li>`;
          i++;
          continue;
        }

        // Empty line
        if (line.trim() === "") {
          i++;
          continue;
        }

        // Regular paragraph
        html += `<p>${inlineMarkdown(line)}</p>`;
        i++;
      }

      // Close open tags
      if (inList) html += `</${listTag}>`;
      if (inBlockquote) html += "</blockquote>";

      return html;
    }

    function inlineMarkdown(text) {
      // Inline code (must be first to avoid interference)
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      // Bold+italic
      text = text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
      // Bold
      text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      // Italic
      text = text.replace(/(?<!\*)\*([^*]+?)\*(?!\*)/g, "<em>$1</em>");
      // Links
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" title="$2">$1</a>');
      // Checkbox (task list items)
      text = text.replace(/\[x\]/gi, "&#9745;");
      text = text.replace(/\[ \]/g, "&#9744;");
      return text;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── @file autocomplete ──

    function checkAtMention() {
      const cursorPos = inputEl.selectionStart;
      const textBefore = inputEl.value.substring(0, cursorPos);

      // Look for an '@' that starts a mention (preceded by start-of-string or whitespace)
      const match = textBefore.match(/(^|[\s])@([^\s]*)$/);
      if (match) {
        atMentionStart = textBefore.length - match[2].length - 1; // position of '@'
        const query = match[2]; // text after '@'
        send("fileSearch", { query });
      } else {
        hideFilePopup();
      }
    }

    function showFilePopup(files) {
      popupItems = files;
      popupActiveIdx = 0;

      if (files.length === 0) {
        hideFilePopup();
        return;
      }

      filePopup.innerHTML = "";

      // Header
      const header = document.createElement("div");
      header.className = "popup-header";
      header.textContent = "Files — select to attach";
      filePopup.appendChild(header);

      files.forEach((file, idx) => {
        const item = document.createElement("div");
        item.className = "file-item" + (idx === 0 ? " active" : "");
        item.setAttribute("data-idx", idx);
        item.innerHTML =
          `<span class="file-icon">\u{1F4C4}</span>` +
          `<span class="file-name">${escapeHtml(file.name)}</span>` +
          `<span class="file-path">${escapeHtml(file.path)}</span>`;
        item.addEventListener("mousedown", (e) => {
          e.preventDefault(); // prevent textarea blur
          insertFileReference(files[idx]);
        });
        item.addEventListener("mouseenter", () => {
          popupActiveIdx = idx;
          renderPopupHighlight();
        });
        filePopup.appendChild(item);
      });

      filePopup.classList.add("visible");
      popupVisible = true;
    }

    function hideFilePopup() {
      filePopup.classList.remove("visible");
      popupVisible = false;
      popupItems = [];
      popupActiveIdx = 0;
      atMentionStart = -1;
    }

    function renderPopupHighlight() {
      const items = filePopup.querySelectorAll(".file-item");
      items.forEach((el, idx) => {
        el.classList.toggle("active", idx === popupActiveIdx);
      });
      // Scroll active item into view
      const active = items[popupActiveIdx];
      if (active) {
        active.scrollIntoView({ block: "nearest" });
      }
    }

    function insertFileReference(file) {
      if (!file || atMentionStart < 0) {
        hideFilePopup();
        return;
      }

      const before = inputEl.value.substring(0, atMentionStart);
      const after = inputEl.value.substring(inputEl.selectionStart);
      const ref = `@${file.path}`;
      inputEl.value = before + ref + (after.startsWith(" ") ? "" : " ") + after;

      // Position cursor after the inserted reference
      const newPos = before.length + ref.length + (after.startsWith(" ") ? 0 : 1);
      inputEl.selectionStart = newPos;
      inputEl.selectionEnd = newPos;
      inputEl.focus();

      hideFilePopup();

      // Resize textarea
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    }

    // Hide popup when textarea loses focus (with a small delay to allow mousedown on items)
    inputEl.addEventListener("blur", () => {
      setTimeout(() => hideFilePopup(), 150);
    });

    // Signal readiness
    send("ready", {});
  </script>
</body>
</html>
