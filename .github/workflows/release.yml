name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Determine version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX (VS Code Marketplace)
        run: npm run package:vscode

      - name: Rename VS Code VSIX
        run: mv "vscode-querymt-${{ steps.meta.outputs.version }}.vsix" "vscode-querymt-${{ steps.meta.outputs.version }}-vscode.vsix"

      - name: Package VSIX (Open VSX)
        run: npm run package:ovsx

      - name: Rename Open VSX VSIX
        run: mv "vscode-querymt-${{ steps.meta.outputs.version }}.vsix" "vscode-querymt-${{ steps.meta.outputs.version }}-ovsx.vsix"

      - name: Verify VSIX files exist
        run: ls -lh vscode-querymt-${{ steps.meta.outputs.version }}-*.vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath "vscode-querymt-${{ steps.meta.outputs.version }}-vscode.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: vars.PUBLISH_OVSX == 'true'
        run: npx ovsx publish "vscode-querymt-${{ steps.meta.outputs.version }}-ovsx.vsix"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vscode-querymt-${{ steps.meta.outputs.version }}-vscode.vsix
            vscode-querymt-${{ steps.meta.outputs.version }}-ovsx.vsix
          generate_release_notes: true
