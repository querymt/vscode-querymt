name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package

  protocol-tests:
    runs-on: ubuntu-latest
    if: vars.QMTCODE_BIN != ''
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run protocol integration tests
        run: npm run test:protocol
        env:
          QMTCODE_BIN: ${{ vars.QMTCODE_BIN }}
          QMTCODE_CONFIG: ${{ vars.QMTCODE_CONFIG }}

  extension-host-tests:
    runs-on: ubuntu-latest
    if: vars.QMTCODE_BIN != ''
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run extension host smoke tests
        run: xvfb-run -a npm run test:extension
        env:
          QMTCODE_BIN: ${{ vars.QMTCODE_BIN }}
          QMTCODE_CONFIG: ${{ vars.QMTCODE_CONFIG }}
